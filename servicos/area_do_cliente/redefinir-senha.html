<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha | JL Serviços Contábeis</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #0e2a47 0%, #0a192f 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(189, 150, 23, 0.3);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-container h2 {
            font-family: 'Playfair Display', serif;
            color: #bd9617;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .login-container p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 30px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #bd9617;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #bd9617;
            background: rgba(0, 0, 0, 0.4);
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #bd9617 0%, #8e7112 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(189, 150, 23, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #message {
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            padding: 10px;
            border-radius: 8px;
        }
        .success { background: rgba(37, 211, 102, 0.2); color: #25d366; border: 1px solid #25d366; }
        .error { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>

   <div class="login-container">
    <h2>Nova Senha</h2>
    <p>Digite sua nova senha abaixo.</p>

    <div id="message"></div>

    <form id="reset-form">
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Nova senha" required minlength="6">
        </div>
        
        <button type="submit" class="btn-login" id="btn-reset">Salvar Nova Senha</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = 'https://qdgsmnfhpbkbovptwwjp.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZ3NtbmZocGJrYm92cHR3d2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgxNTQ1MzYsImV4cCI6MjA4MzczMDUzNn0.-fpxGBv738LflicnI2edM7ywwAmed3Uka4111fzTj8c'; 

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    document.getElementById('reset-form').onsubmit = async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-reset');
        const msg = document.getElementById('message');

        btn.disabled = true;
        btn.innerText = "SALVANDO...";
        msg.style.display = 'none';

        try {
            const { error } = await supabaseClient.auth.updateUser({ password: password });

            if (error) {
                msg.innerText = "Erro: " + error.message;
                msg.className = "error";
            } else {
                msg.innerText = "Senha alterada com sucesso! Redirecionando...";
                msg.className = "success";
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        } catch (err) {
            msg.innerText = "Ocorreu um erro inesperado.";
            msg.className = "error";
        } finally {
            msg.style.display = 'block';
            btn.disabled = false;
            btn.innerText = "Salvar Nova Senha";
        }
    };
</script>
</body>
</html>
